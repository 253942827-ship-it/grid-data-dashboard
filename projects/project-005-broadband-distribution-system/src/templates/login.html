{% extends "base.html" %}
{% block title %}登录 - 宽带分销系统{% endblock %}
{% block content %}
<style>
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d1b4a,#1a237e)}
.login-box{background:#fff;padding:36px;border-radius:14px;width:360px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.login-box h1{font-size:20px;color:#1a237e;text-align:center;margin-bottom:24px}
.login-box .form-group{margin-bottom:14px}
.login-box label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.login-box input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.login-box input:focus{outline:none;border-color:#1a237e}
.login-box .btn{width:100%;padding:10px;font-size:14px;margin-top:8px}
.login-box .error{color:#c62828;font-size:12px;text-align:center;margin-top:8px}
</style>
<div class="login-wrap">
<div class="login-box">
<h1>📡 宽带分销系统</h1>
<form method="POST">
<div class="form-group"><label>用户名</label><input type="text" name="username" required autofocus></div>
<div class="form-group"><label>密码</label><input type="password" name="password" required></div>
<button class="btn btn-primary">登 录</button>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
</form>
</div>
</div>
{% endblock %}
