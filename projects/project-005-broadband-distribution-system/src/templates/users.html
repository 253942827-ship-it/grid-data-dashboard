{% extends "base.html" %}
{% block title %}用户管理 - 宽带分销系统{% endblock %}
{% block content %}
<div class="topbar"><h1>👥 用户管理</h1>
<button class="btn btn-primary btn-sm" onclick="openModal('addUserModal')"><i class="fas fa-user-plus"></i> 新增用户</button></div>
<div class="card">
<table><thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>状态</th><th>创建时间</th></tr></thead>
<tbody>{% for u in users %}
<tr><td>{{ u.username }}</td><td>{{ u.name }}</td>
<td><span class="tag" style="background:#e8eaf6;color:#1a237e">{{ u.role }}</span></td>
<td><span class="tag tag-{{ 'active' if u.active else 'deleted' }}">{{ '启用' if u.active else '禁用' }}</span></td>
<td>{{ u.created_at[:10] }}</td></tr>
{% endfor %}</tbody></table></div>
<div class="modal-overlay" id="addUserModal">
<div class="modal"><h2>👤 新增用户</h2>
<form onsubmit="event.preventDefault();addUser()">
<div class="form-row">
<div class="form-group"><label>用户名 *</label><input name="username" required></div>
<div class="form-group"><label>姓名 *</label><input name="name" required></div></div>
<div class="form-row">
<div class="form-group"><label>密码 *</label><input name="password" type="password" required></div>
<div class="form-group"><label>角色</label>
<select name="role"><option value="order_clerk">订单录入员</option><option value="finance">财务结算员</option><option value="commission">佣金管理员</option><option value="admin">管理员</option></select></div></div>
<button class="btn btn-primary">保存</button></form></div></div>
<script>
function addUser(){
  var f = new FormData(document.querySelector('#addUserModal form'));
  fetch('/users/add',{method:'POST',body:f}).then(function(r){return r.json()}).then(function(j){
    if(j.ok){showToast('用户已添加','success');location.reload()}
    else showToast(j.error,'error');
  });
}
</script>
{% endblock %}
